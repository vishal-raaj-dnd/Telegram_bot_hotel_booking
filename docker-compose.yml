version: '3.9'

services:
  # ── Application ──────────────────────────────────────────────────
  api:
    build:
      context: .
      target: builder  # Use builder stage for dev (has ts-node)
    command: npm run dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://hotelbot:hotelbot_secret@postgres:5432/hotelbot_dev
      REDIS_URL: redis://redis:6379
      # All other secrets come from .env file
    env_file:
      - .env
    volumes:
      - ./src:/app/src    # Hot reload in dev
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hotelbot
      POSTGRES_PASSWORD: hotelbot_secret
      POSTGRES_DB: hotelbot_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hotelbot -d hotelbot_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
